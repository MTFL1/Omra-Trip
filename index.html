<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO -->
    <meta
      name="description"
      content="Omra Trip — Agence de voyages spécialisée dans l'Omra. Formules économiques, confort et premium pour votre pèlerinage."
    />

    <!-- Open Graph -->
    <meta property="og:title" content="Omra Trip — Votre pèlerinage en toute sérénité" />
    <meta
      property="og:description"
      content="Omra Trip — Agence de voyages spécialisée dans l'Omra. Formules économiques, confort et premium pour votre pèlerinage."
    />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Favicon: replace with actual favicon.ico -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Theme color -->
    <meta name="theme-color" content="transparent" />

    <!-- Preconnect pour réduire la latence Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Omra Trip — Voyages Omra</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
